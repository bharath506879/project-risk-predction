global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'riskguard'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'riskguard-api'
    static_configs:
      - targets: ['localhost:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:5432']

  - job_name: 'nginx'
    static_configs:
      - targets: ['localhost:80']
